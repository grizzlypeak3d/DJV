title: DJV
description: >-
  Free, open-source high bit-depth image sequence player for
  professional film, VFX, and animation review.

url: https://grizzlypeak3d.github.io
baseurl: /DJV

# Use Just the Docs as a remote theme. This is the supported route on
# GitHub Pages (the plain `theme:` key won't work for this theme there).
# To pin a version for stability, append a tag, e.g.
#   remote_theme: just-the-docs/just-the-docs@v0.10.1
# Releases: https://github.com/just-the-docs/just-the-docs/releases
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

search_enabled: true
search:
  heading_level: 2

color_scheme: dark

# Link shown top-right on every page.
aux_links:
  DJV on GitHub:
    - https://github.com/grizzlypeak3d/DJV
aux_links_new_tab: true

# "Edit this page on GitHub" footer link.
gh_edit_link: true
gh_edit_link_text: Edit this page on GitHub
gh_edit_repository: https://github.com/grizzlypeak3d/DJV
gh_edit_branch: main
gh_edit_source: docs
gh_edit_view_mode: edit

# Callout styles — use as `{: .note }`, `{: .warning }`, `{: .tip }` in pages.
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green
