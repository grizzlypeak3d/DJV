name: CI

on: [push]

jobs:
  linux-build:
    runs-on: ubuntu-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: ON
      TLRENDER_SVTAV1: ON
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: ON
      TLRENDER_FFMPEG_CMD: OFF
      TLRENDER_NASM: ON
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup environment
      run: |
        echo "$PWD/install-Debug/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=$PWD/install-Debug/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD/install-Debug/lib:$PYTHONPATH" >> $GITHUB_ENV
        cmake --version
        python --version
        sh djv/etc/Linux/linux-setup-gha.sh

    - name: Build
      run: |
        sh djv/etc/Linux/linux-sbuild.sh djv Debug

  # \bug Disable building OIIO; it seems there is an error when OCIO is disabled.
  linux-gles2-build:
    runs-on: ubuntu-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: OFF
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: OFF
      TLRENDER_SVTAV1: OFF
      TLRENDER_FFMPEG: OFF
      TLRENDER_FFMPEG_MINIMAL: OFF
      TLRENDER_FFMPEG_PLUGIN: OFF
      TLRENDER_FFMPEG_CMD: OFF
      TLRENDER_NASM: ON
      TLRENDER_OIIO: OFF
      TLRENDER_USD: OFF
      FTK_API: GLES_2

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup environment
      run: |
        echo "$PWD/install-Debug/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=$PWD/install-Debug/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD/install-Debug/lib:$PYTHONPATH" >> $GITHUB_ENV
        cmake --version
        python --version
        python --version
        sh djv/etc/Linux/linux-setup-gha.sh

    - name: Build
      run: |
        sh djv/etc/Linux/linux-sbuild.sh djv Debug

  linux-package:
    runs-on: ubuntu-22.04

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: ON
      TLRENDER_SVTAV1: ON
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: OFF
      TLRENDER_FFMPEG_CMD: ON
      TLRENDER_NASM: ON
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup environment
      run: |
        echo "$PWD/install-Release/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=$PWD/install-Release/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD/install-Release/lib:$PYTHONPATH" >> $GITHUB_ENV
        cmake --version
        python --version
        python --version
        sh djv/etc/Linux/linux-setup-gha.sh

    - name: Build
      run: |
        sh djv/etc/Linux/linux-sbuild.sh djv Release

    - name: Package
      run: |
        cmake --build build-Release --config Release --target package

    - uses: actions/upload-artifact@v7
      with:
        name: DJV-Linux-Packages
        path: build-Release/djv-*.tar.gz
        archive: false

  macos-build:
    runs-on: macos-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: ON
      TLRENDER_SVTAV1: ON
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: ON
      TLRENDER_FFMPEG_CMD: OFF
      TLRENDER_NASM: ON
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF
      CMAKE_OSX_DEPLOYMENT_TARGET: 14
      CMAKE_OSX_ARCHITECTURES: arm64

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # \bug DYLD_LIBRARY_PATH is not being set here?
    - name: Setup environment
      run: |
        echo "$PWD/install-Debug/bin" >> $GITHUB_PATH
        echo "DYLD_LIBRARY_PATH=$PWD/install-Debug/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD/install-Debug/lib:$PYTHONPATH" >> $GITHUB_ENV
        cmake --version
        python --version

    - name: Build
      run: |
        export DYLD_LIBRARY_PATH=$PWD/install-Debug/lib:$DYLD_LIBRARY_PATH
        sh djv/etc/macOS/macos-sbuild.sh djv Debug

  macos-package:
    runs-on: macos-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: ON
      TLRENDER_SVTAV1: ON
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: OFF
      TLRENDER_FFMPEG_CMD: ON
      TLRENDER_NASM: ON
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF
      CMAKE_OSX_DEPLOYMENT_TARGET: 10.15
      CMAKE_OSX_ARCHITECTURES: arm64

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # \bug DYLD_LIBRARY_PATH is not being set here?
    - name: Setup environment
      run: |
        echo "$PWD/install-Release/bin" >> $GITHUB_PATH
        echo "DYLD_LIBRARY_PATH=$PWD/install-Release/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD/install-Release/lib:$PYTHONPATH" >> $GITHUB_ENV
        cmake --version
        python --version

    - name: Build
      run: |
        export DYLD_LIBRARY_PATH=$PWD/install-Release/lib:$DYLD_LIBRARY_PATH
        sh djv/etc/macOS/macos-sbuild.sh djv Release

    - name: Package
      run: |
        cmake --build build-Release --config Release --target package

    - uses: actions/upload-artifact@v7
      with:
        name: DJV-macOS-Packages
        path: build-Release/djv-*.dmg
        archive: false

  windows-build:
    runs-on: windows-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: OFF
      TLRENDER_SVTAV1: OFF
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: ON
      TLRENDER_FFMPEG_CMD: OFF
      TLRENDER_NASM: OFF
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - uses: ilammy/setup-nasm@v1

    # \bug Any spaces before the ">>" will be considered part of the path.
    - name: Setup environment
      shell: cmd
      run: |
        echo %CD%\install-Debug\bin>> %GITHUB_PATH%
        echo %CD%\install-Debug\lib>> %GITHUB_PATH%
        echo CTEST_OUTPUT_ON_FAILURE=1 >> %GITHUB_ENV%
        cmake --version
        python --version
        
    - name: Build
      shell: cmd
      run: |
        djv\etc\Windows\windows-sbuild.bat djv Debug

  windows-package:
    runs-on: windows-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: OFF
      TLRENDER_SVTAV1: OFF
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: OFF
      TLRENDER_FFMPEG_CMD: ON
      TLRENDER_NASM: OFF
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - uses: ilammy/setup-nasm@v1

    # \bug Any spaces before the ">>" will be considered part of the path.
    - name: Setup environment
      shell: cmd
      run: |
        echo %CD%\install-Release\bin>> %GITHUB_PATH%
        echo %CD%\install-Release\lib>> %GITHUB_PATH%
        echo CTEST_OUTPUT_ON_FAILURE=1 >> %GITHUB_ENV%
        cmake --version
        python --version
        winget install NSIS.NSIS --accept-package-agreements --accept-source-agreements --disable-interactivity

    - name: Build
      shell: cmd
      run: |
        djv\etc\Windows\windows-sbuild.bat djv Release

    - name: Package
      shell: cmd
      run: |
        cmake --build build-Release --config Release --target package

    - uses: actions/upload-artifact@v7
      with:
        name: DJV-Windows-Packages
        path: |
          build-Release\djv-*.exe
          build-Release\djv-*.zip
        archive: true
